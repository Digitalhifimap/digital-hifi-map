<!DOCTYPE html>
<html>
  <head>
    <title>JavaScript Sandbox</title>
    <meta charset="UTF-8" />
        <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      html, body {
        height: 100%;
        margin: 0;
      }
      #map {
        height: 100%;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="top-nav">
      <a href="index.html">Home</a>
      <a href="map.html">Digital Map</a>
      <a href="instructions.html">How to Use</a>
      <a href="about.html">About</a>
    </div>

    <h1>Aaaaaa Digital Map of Historic Filipinotown</h1>
    <h3>A Community Media Lab (SIPA) Project</h3>

    <label class="tour-toggle">
      <input type="checkbox" id="show-tour-buttons" /> Show tour buttons
    </label><br>

    <input type="checkbox" id="la-overlay-toggle" name="la-overlay-toggle" />
    <label for="la-overlay-toggle"> Show historical imagery</label>

    <div id="map"></div>
    <div class="nav-buttons" id="tour-buttons">
      <button id="move-backward">←</button>
      <button id="move-forward">→</button>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      const map = L.map("map").setView([34.061, -118.269], 14);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors",
      }).addTo(map);
    </script>
  </body>
</html>
